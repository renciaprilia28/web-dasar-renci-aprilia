<script>
function validasi() {
    let nama = document.getElementById("nama").value;
    let email = document.getElementById("email").value;

    if (nama.length < 3) {
        document.getElementById("pesan").innerText = "Nama minimal 3 karakter!";
        return false;
    }

    if (!email.includes("@")) {
        document.getElementById("pesan").innerText = "Email tidak valid!";
        return false;
    }

    document.getElementById("pesan").innerText = "Berhasil dikirim!";
    return false;
}
</script>
